# Don't add a blank line between prompt loops
add_newline = false

# Explicitly define the prompt layout order
format = """
$git_branch\
$git_status\
$directory\
$character\
"""

[directory]
truncation_length = 3      # Only show the last 3 directories if the path gets long
truncate_to_repo = true    # If inside a Git repo, start the path at the repo folder root
style = "bold cyan"

# ---------------------------------------------------------
#   Git Configuration
# ---------------------------------------------------------
[git_branch]
symbol = "🌱 "
style = "bold magenta"
format = "on [$symbol$branch]($style) "

[git_status]
style = "bold red"
# Clean text indicators instead of cryptic punctuation symbols
conflicted = "🏳 "
ahead = "⇡"
behind = "⇣"
diverged = "⇕"
untracked = " +?"
modified = " *~"
staged = " +"
renamed = " »"
deleted = " -"
format = "([$all_status$ahead_behind]($style) )"
[character]
# Text/Symbol shown when you are in INSERT mode (Default typing mode)
success_symbol = "[ I ](bold green) ❯"
error_symbol = "[ I ](bold red) ❯"

# Text/Symbol shown when you hit Esc to go into NORMAL mode (Vi navigation)
vimcmd_symbol = "[ N ](bold yellow) ❯"

# Text/Symbol shown when you use replacement chords (Visual/Replace mode)
vimcmd_replace_one_symbol = "[ R ](bold purple) ❯"
vimcmd_replace_symbol = "[ R ](bold purple) ❯"
vimcmd_visual_symbol = "[ V ](bold magenta) ❯"

